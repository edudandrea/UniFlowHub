<ngx-spinner
  [bdColor]="spinnerBackdropColor()"
  size="medium"
  color="#57f49a"
  type="ball-scale-multiple"
  [fullScreen]="true"
>
  <div class="brand-spinner" role="status" aria-live="polite">
    <img class="brand-spinner-logo" src="/drsul-logo.svg" alt="Grupo DRSUL" />
    <p class="spinner-text">Carregando...</p>
  </div>
</ngx-spinner>

@if (showSidebar()) {
  <aside class="app-sidebar" aria-label="Menu de departamentos">
    <button class="app-brand" type="button" (click)="openShellLink(shellLinks[0])" aria-label="Ir para o dashboard">
      <img src="/drsul-logo.svg" alt="Grupo DRSUL" />
      <span>
        <small>DR Flow Hub</small>
        <strong>Departamentos</strong>
      </span>
    </button>

    <nav class="app-side-nav">
      @for (link of visibleShellLinks(); track link.label) {
        <button
          type="button"
          [class.active]="isActive(link)"
          [class.disabled]="!link.enabled"
          (click)="openShellLink(link)"
        >
          <span>{{ link.label }}</span>
          <small>{{ link.description }}</small>
        </button>
      }
    </nav>
  </aside>
}

<section class="app-route-content" [class.with-sidebar]="showSidebar()">
  <router-outlet />
</section>
<app-profile-dialog />
